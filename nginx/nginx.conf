events {
    worker_connections 1024;
}

http {
    # Upstream services
    upstream app {
        server app:3000;
    }

    upstream socket {
        server socket-service:3003;
    }

    server {
        listen 80;
        server_name _;

        # Timeout pour les connexions WebSocket longues
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_connect_timeout 10;

        # Headers communs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Socket.IO — proxy vers socket-service avec support WebSocket
        location /socket.io/ {
            proxy_pass http://socket/socket.io/;

            # WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Buffers désactivés pour les connexions temps réel
            proxy_buffering off;
            proxy_cache off;

            # CORS
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Tout le reste → app Next.js
        location / {
            proxy_pass http://app;

            # WebSocket support pour Next.js HMR aussi
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
