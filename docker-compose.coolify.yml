services:
  # ── Nginx reverse proxy — seul service exposé vers Coolify ──────────────────
  # Route /socket.io/ → socket-service:3003 (WebSocket natif)
  # Route tout le reste → app:3000
  nginx:
    image: nginx:alpine
    container_name: burger-minute-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - socket-service
    restart: unless-stopped
    networks:
      - burger-network

  # ── Next.js app ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: burger-minute-app
    environment:
      - UPLOAD_DIR=/app/upload
      - EMIT_SERVICE_URL=http://socket-service:3004
      - SOCKET_SERVICE_URL=http://socket-service:3003
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/upload
    restart: unless-stopped
    networks:
      - burger-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Socket.IO service ────────────────────────────────────────────────────────
  socket-service:
    build:
      context: ./mini-services/socket-service
      dockerfile: Dockerfile
    container_name: burger-minute-socket
    environment:
      - PORT=3003
      - EMIT_PORT=3004
      - API_URL=http://app:3000
    expose:
      - "3003"
      - "3004"
    restart: unless-stopped
    networks:
      - burger-network
    depends_on:
      - app

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: burger-minute-redis
    command: /bin/sh -c 'redis-server --requirepass "$${REDIS_PASSWORD:-burgerm1nute}" --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-burgerm1nute}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - burger-network

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: burger-minute-db
    environment:
      POSTGRES_DB: burger_minute
      POSTGRES_USER: burger
      POSTGRES_PASSWORD: burger_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U burger -d burger_minute"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - burger-network

volumes:
  postgres_data:
  uploads_data:
  redis_data:

networks:
  burger-network:
    driver: bridge
